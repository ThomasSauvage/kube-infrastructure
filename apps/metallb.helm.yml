apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: metallb
  namespace: argocd

spec:
  project: default

  source:
    chart: metallb
    repoURL: https://metallb.github.io/metallb
    targetRevision: 0.15.3

    helm:
      releaseName: metallb

  destination:
    namespace: metallb-system
    name: in-cluster

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
