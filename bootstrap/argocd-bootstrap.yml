apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-bootstrap
  namespace: argocd
spec:
  destination:
    name: in-cluster
    namespace: argocd
  source:
    path: apps
    repoURL: https://github.com/ThomasSauvage/br-over-telecom
    targetRevision: HEAD
  project: default
