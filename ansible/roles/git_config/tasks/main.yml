- name: Install git
  ansible.builtin.package:
    name: git
    state: present
  become: true

- name: Set user name for git
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ git_config__user_name }}"

- name: Set user email for git
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ git_config__user_email }}"

- name: Set default branch name to main
  community.general.git_config:
    name: init.defaultBranch
    scope: global
    value: main

- name: Set signing with SSH
  community.general.git_config:
    name: commit.gpgSign
    scope: global
    value: true

- name: Set SSH as the default signing method
  community.general.git_config:
    name: gpg.format
    scope: global
    value: ssh

- name: Set the SSH key to use for signing
  community.general.git_config:
    name: user.signingKey
    scope: global
    value: "{{ git_config__signing_key }}"
