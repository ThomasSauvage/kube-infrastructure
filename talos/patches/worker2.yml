machine:
    network:
        hostname: worker2
        interfaces:
            - interface: eth0
              addresses:
                - 192.168.1.107/24
              routes:
                - network: 0.0.0.0/0
                  gateway: 192.168.1.254
              # mtu: 1500
              dhcp: false
            - interface: eth1
              addresses:
                - 2a01:e0a:a67:5151::107/64
              routes:
                - network: ::/0
                  gateway: 2a01:e0a:a67:5151::1
              # mtu: 1500
              dhcp: false

    # Disable IPv6 autoconfiguration and router advertisements on eth0
    sysctls:
      net.ipv6.conf.eth0.autoconf: "0"
      net.ipv6.conf.eth0.accept_ra: "0"
