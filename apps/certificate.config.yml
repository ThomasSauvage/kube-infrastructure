apiVersion: cert-manager.io/v1
kind: Certificate

metadata:
  name: brot-certificate
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "-2"

spec:
  issuerRef:
    name: le-prod
    kind: ClusterIssuer
  secretName: brot-certificate

  dnsNames:
    - brot.epy.ovh
    - "*.brot.epy.ovh"
