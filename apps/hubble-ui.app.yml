apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: hubble-ui
  namespace: kube-system

spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "hubble.brot.epy.ovh"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: hubble-ui
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /

---
# see: https://gateway.envoyproxy.io/docs/tasks/security/basic-auth
apiVersion: gateway.envoyproxy.io/v1alpha1

kind: SecurityPolicy
metadata:
  name: basic-auth-hubble
  namespace: kube-system

spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: hubble-ui
  basicAuth:
    users:
      # name of the secret
      name: "basic-auth-credentials"
