# Doc: https://docs.cilium.io/en/stable/helm-reference/

# image:
#   pullPolicy: IfNotPresent

ipam:
  mode: kubernetes

ipv4:
  enabled: true
ipv6:
  enabled: true

prometheus:
  enabled: true

operator:
  prometheus:
    enabled: true

  # Restart Cilium pods when Cilium config changes
  rollOutPods: true

# Restart Cilium pods when Cilium config changes
rollOutCiliumPods: true

hubble:
  enabled: true
  ui:
    # Restart Cilium pods when Cilium config changes
    rollOutPods: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - port-distribution
      - icmp
      - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"

# Ingress Controller
# ingressController:
#   enabled: true
#   loadbalancerMode: shared

# L2 Load balancer
l2announcements:
  enabled: true

kubeProxyReplacement: true

# Recommended by Talos
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

k8sServiceHost: localhost
k8sServicePort: 7445
