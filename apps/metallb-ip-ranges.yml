apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: main-pool
  namespace: metallb-system
  # annotations:
  #   argocd.argoproj.io/sync-wave: "5" # Deploys after the operator
spec:
  addresses:
    - 192.168.1.250/32
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-loadbalancer
  namespace: metallb-system
  # annotations:
  #   argocd.argoproj.io/sync-wave: "5" # Deploys after the operator
spec:
  ipAddressPools:
    - main-pool
