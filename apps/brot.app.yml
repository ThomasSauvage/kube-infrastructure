apiVersion: v1
kind: Namespace

metadata:
  name: brot-app

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gha-rollout-restart
  namespace: brot-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gha-rollout-restart
  namespace: brot-app
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["brot-app"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gha-rollout-restart
  namespace: brot-app
subjects:
  - kind: ServiceAccount
    name: gha-rollout-restart
    namespace: brot-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gha-rollout-restart
---
apiVersion: v1
kind: Secret
metadata:
  name: gha-rollout-restart-token
  namespace: brot-app
  annotations:
    kubernetes.io/service-account.name: gha-rollout-restart
type: kubernetes.io/service-account-token
---
kind: Deployment
apiVersion: apps/v1

metadata:
  name: brot-app
  labels:
    app: brot-app
  namespace: brot-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: brot-app
  template:
    metadata:
      labels:
        app: brot-app
        # Allows communication with Envoy Gateway
        security-gateway-accessible: "true"
    spec:
      # Run the container as a non-root user for better security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: brot-app-registry-credentials
      containers:
        - name: brot-app
          image: ghcr.io/thomassauvage/brot-app:latest
          imagePullPolicy: Always
          # Add additional security settings to the container
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: false
          ports:
            - name: web
              containerPort: 80
          resources:
            requests:
              cpu: "300m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service

metadata:
  name: brot-app
  namespace: brot-app

spec:
  selector:
    app: brot-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: brot-app
  namespace: brot-app

spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: https

  hostnames:
    - "brot.epy.ovh"

  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: brot-app
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
